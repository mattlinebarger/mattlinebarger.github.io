        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
        <script type="text/javascript">function ajaxLink(eg_title, eg_url){
            $.get(eg_url);
            var wrapper = document.createElement('div')
            wrapper.innerHTML = '<div class="alert alert-success alert-dismissible align-middle" role="alert"><svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Success:"><use xlink:href="#check-circle-fill"/></svg><strong>' + eg_title + '</strong> has been triggered!<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button></div>'

            document.getElementById('alert-placeholder').append(wrapper)
            $(".alert").delay(3000).fadeOut(500, function () { $(this).remove(); });
            };
        </script>
    </head>

    <body>

            </symbol>
          </svg>
        <div id="alert-placeholder" class="col-6 ms-3 mt-3"></div>
        <div class="col-3 ms-3">
            <ul class="list-group">
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    30 Day Demo
                    <button id="liveAlertBtn" type="button" class="btn btn-outline-primary btn-sm" onClick="ajaxLink('30 Day Demo', 'https://webhook.site/782e02de-877b-47ab-931b-298fa863808a');">Run</button>
                </li>
                <li class="list-group-item d-flex justify-content-between align-items-center">

                </li>
